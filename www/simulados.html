<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="theme.js"></script>
<title>Track Concursos — Simulados</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a; --bg4:#1f2330;
    --border:#252836; --border2:#2e3347;
    --accent:#4f8ef7; --accent2:#7c5cfc;
    --text:#e8eaf2; --text2:#f1f2f6; --text3:#a1a6c2;
    --green:#3ecf8e; --green2:#27a06b; --yellow:#FFD700; --orange:#f5874a; --red:#f55a5a;
    --mono:'Inter',sans-serif; --sans:'Inter',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-variant-numeric:tabular-nums;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;z-index:100;}
  .sidebar-logo{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
  .brand-logo {
    height: 36px;
    max-width: 180px;
    width: auto;
    object-fit: contain;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .brand-logo:hover { transform: scale(1.04); }
  .nav{padding:16px 12px;flex:1;}
  .nav-label{font-size:12px;font-weight:600;letter-spacing:1.5px;color:var(--text3);padding:0 8px;margin-bottom:8px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text2);transition:all 0.15s;margin-bottom:2px;}
  .nav-item:hover{background:var(--bg3);color:var(--text);}
  .nav-item.active{background:rgba(79,142,247,0.12);color:var(--accent);}
  .nav-item .icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-concurso{margin:0 12px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
  .concurso-nome{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
  .concurso-banca{font-size:12px;color:var(--text3);margin-bottom:10px;}
  .timer-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;}
  .timer-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);line-height:1;}
  .timer-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

  .main{margin-left:220px;min-height:100vh;padding:32px;}

  /* HEADER */
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}
  .page-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
  .page-sub{font-size:12px;color:var(--text3);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .filtro-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .filtro-chip:hover{border-color:var(--accent);color:var(--accent);}
  .filtro-chip.active{background:rgba(79,142,247,0.12);border-color:var(--accent);color:var(--accent);}
  .btn-new{display:flex;align-items:center;gap:7px;padding:9px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(79,142,247,0.3);}
  .btn-new:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(79,142,247,0.4);}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .stat-card.blue::before{background:var(--accent);}
  .stat-card.green::before{background:var(--green);}
  .stat-card.yellow::before{background:var(--yellow);}
  .stat-card.purple::before{background:var(--accent2);}
  .stat-icon{font-size:18px;margin-bottom:10px;display:block;}
  .stat-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);line-height:1;}
  .stat-label{font-size:12px;color:var(--text3);margin-top:5px;}
  .stat-delta{font-size:12px;font-weight:700;margin-top:3px;color:var(--green);}

  /* LAYOUT */
  .content-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;}

  /* SIMULADO CARD */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
  .section-count{font-family:var(--mono);font-size:12px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 9px;border-radius:20px;}

  .sim-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}

  .sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.15s;}
  .sim-card:hover{border-color:var(--border2);}
  .sim-card.sem-resultado{opacity:0.75;}

  .sim-card-top{display:flex;align-items:center;gap:12px;padding:14px 16px;}
  .sim-emoji{font-size:24px;flex-shrink:0;width:42px;height:42px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
  .sim-info{flex:1;min-width:0;}
  .sim-nome{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sim-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .sim-banca{font-size:12px;color:var(--text3);}
  .sim-data{font-size:12px;font-family:var(--mono);color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:10px;}
  .sim-concurso-dot{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);}
  .cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

  .sim-resultado{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .pct-badge{font-family:var(--mono);font-size:14px;font-weight:700;padding:4px 10px;border-radius:8px;}
  .pct-badge.g1{background:var(--score-excellent-bg);color:var(--score-excellent);}
  .pct-badge.g2{background:var(--score-good-bg);color:var(--score-good);}
  .pct-badge.y{background:var(--score-ok-bg);color:var(--score-ok);}
  .pct-badge.o{background:var(--score-mid-bg);color:var(--score-mid);}
  .pct-badge.r{background:var(--score-low-bg);color:var(--score-low);}
  .pct-badge.none{background:var(--bg3);color:var(--text3);font-size:12px;}

  .btn-abrir{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.25);color:var(--accent);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .btn-abrir:hover{background:rgba(79,142,247,0.18);}

  /* RESULTADO INLINE */
  .sim-card-resultado{padding:0 16px 12px;display:flex;align-items:center;gap:8px;}
  .resultado-stats{display:flex;gap:12px;flex:1;}
  .res-stat{font-size:12px;color:var(--text2);font-family:var(--mono);}
  .res-stat span{font-weight:700;}
  .res-stat span.c{color:var(--green);}
  .res-stat span.e{color:var(--red);}

  /* COLE RESULTADO */
  .sim-card-cole{padding:0 16px 12px;display:flex;align-items:center;gap:8px;}
  .cole-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;flex-shrink:0;}
  .cole-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color 0.15s;}
  .cole-input:focus{border-color:var(--accent);}
  .cole-input::placeholder{color:var(--text3);}
  .cole-btn{padding:6px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.15s;flex-shrink:0;}
  .cole-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* ADD CARD */
  .add-sim-card{background:transparent;border:2px dashed var(--border2);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all 0.2s;color:var(--text3);font-size:12px;font-weight:600;}
  .add-sim-card:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,0.04);}

  /* RIGHT PANEL */
  .right-panel{display:flex;flex-direction:column;gap:18px;}
  .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;}
  .chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .chart-sub{font-size:12px;color:var(--text3);margin-bottom:16px;}
  .sim-panels{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:20px;align-items:start;}
  .sim-panel-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;min-width:0;}
  .sim-chart-stack{display:flex;flex-direction:column;gap:20px;min-width:0;}
  .sim-chart-stage{height:320px;min-height:260px;}
  .sim-toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .sim-toolbar-controls{display:flex;gap:8px;flex-wrap:wrap;}
  .sim-select{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;min-width:150px;}
  .sim-chart-empty{height:100%;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border2);border-radius:12px;color:var(--text3);font-size:12px;text-align:center;padding:20px;}
  .sim-materia-summary{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:16px;}
  .sim-materia-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;min-width:0;}
  .sim-materia-label{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .sim-materia-main{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--text);line-height:1.1;}
  .sim-materia-support{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.45;}
  .sim-materia-empty{font-size:12px;color:var(--text3);line-height:1.5;}
  .sim-list-scroll{max-height:540px;overflow:auto;padding-right:6px;}
  .sim-list-scroll::-webkit-scrollbar{width:8px;}
  .sim-list-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px;}
  .sim-list-scroll::-webkit-scrollbar-track{background:transparent;}

  /* RANKING SIMULADOS */
  .ranking-list{display:flex;flex-direction:column;gap:8px;}
  .rank-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);}
  .rank-pos{font-family:var(--mono);font-size:12px;font-weight:700;width:20px;flex-shrink:0;}
  .rank-pos.gold{color:var(--yellow);}
  .rank-pos.silver{color:var(--text2);}
  .rank-pos.bronze{color:var(--orange);}
  .rank-nome{flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-pct{font-family:var(--mono);font-size:12px;font-weight:700;}

  /* DIVIDER */
  .section-divider{display:flex;align-items:center;gap:12px;margin:8px 0 20px;}
  .div-line{flex:1;height:1px;background:var(--border);}
  .div-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);white-space:nowrap;}

  /* POPUP NOVO SIMULADO */
  .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .popup-overlay.visible{opacity:1;pointer-events:all;}
  .popup{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:460px;width:90%;transform:scale(0.95);transition:transform 0.2s;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
  .popup-overlay.visible .popup{transform:scale(1);}
  .popup-title{font-size:18px;font-weight:700;margin-bottom:20px;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:border-color 0.15s;}
  .form-input:focus{border-color:var(--accent);}
  .tipo-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .tipo-opt{padding:10px;border-radius:9px;border:2px solid var(--border2);background:var(--bg3);cursor:pointer;text-align:center;transition:all 0.15s;}
  .tipo-opt:hover{border-color:var(--accent);}
  .tipo-opt.selected{border-color:var(--accent);background:rgba(79,142,247,0.08);}
  .tipo-opt-icon{font-size:20px;margin-bottom:4px;}
  .tipo-opt-label{font-size:12px;font-weight:600;color:var(--text2);}
  .tipo-opt.selected .tipo-opt-label{color:var(--accent);}
  .popup-btns{display:flex;gap:8px;margin-top:20px;}
  .btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all 0.15s;}
  .btn-cancel:hover{border-color:var(--red);color:var(--red);}
  .btn-salvar{flex:2;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(79,142,247,0.3);}
  .btn-salvar:hover{transform:translateY(-1px);}

  /* Esconder botões nativos de scroll numérico */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; appearance: none; }
  input[type="number"] { -moz-appearance:textfield; appearance: textfield; }

  .ph-meta::placeholder { font-size:10px; font-family:var(--sans); font-weight:600; color:var(--text3); }

  @media (max-width:1180px){
    .sim-panels{grid-template-columns:1fr;}
    .sim-list-scroll{max-height:none;overflow:visible;padding-right:0;}
  }

  @media (max-width:980px){
    .sim-materia-summary{grid-template-columns:1fr;}
  }

  @media (max-width:780px){
    .stats-row{grid-template-columns:repeat(2,1fr);}
  }
</style>

</head>

  <!-- LISTA DE SIMULADOS -->

<script>
// ── SIDEBAR CONCURSO ─────────────────────
(function() {
  const cId = sessionStorage.getItem('ct_concurso_ativo');
  if (!cId) return;
  const c = CT.getConcurso(cId);
  if (!c) return;
  const nomeEl  = document.getElementById('sideNome');
  const bancaEl = document.getElementById('sideBanca');
  const timerEl = document.getElementById('sideTimer');
  const timerLb = document.getElementById('sideTimerLabel');
  const logoEl  = document.getElementById('sideLogoImg');

      document.getElementById('sideTimer').style.color = dias==null?'var(--accent)':dias<=7?'var(--red)':dias<=30?'var(--orange)':'var(--accent)';

    const b = document.getElementById('revBadge');
    if (b) { b.textContent=urgentes; b.style.display=urgentes>0?'':'none'; }
  }
})();

<script>
const cId = sessionStorage.getItem('ct_concurso_ativo');

function pctColor(p){return CT.pctColor?CT.pctColor(p):'var(--text3)';}
function themePalette() {
  return window.TrackTheme ? TrackTheme.palette() : {
    accent: '#4f8ef7',
    accent2: '#7c5cfc',
    text: '#e8eaf2',
    text2: '#f1f2f6',
    text3: '#a1a6c2',
    bg3: '#1a1e2a',
    border: '#252836',
    green: '#3ecf8e',
    yellow: '#FFD700',
    orange: '#f5874a',
    red: '#f55a5a',
    scoreExcellent: '#34f58d',
    scoreGood: '#9cf7cc',
    scoreOk: '#ffe45c',
    scoreMid: '#f5874a',
    scoreLow: '#f55a5a',
    chartAxis: '#555a72',
    chartAxisStrong: '#c8cde2',
    chartGrid: 'rgba(255,255,255,0.05)',
    tooltipBg: '#171b26',
    tooltipBorder: 'rgba(255,255,255,0.08)',
    tooltipTitle: '#f1f2f6',
    tooltipBody: '#b9bfd6',
    chartSurfaceBorder: '#0f1220'
  };
}
function alphaColor(color, alpha) {
  if (!color) return color;
  if (window.TrackTheme && TrackTheme.alpha) return TrackTheme.alpha(color, alpha);
  if (/^#([0-9a-f]{3}){1,2}$/i.test(color)) {
    let hex = color.slice(1);
    if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
    const num = parseInt(hex, 16);
    const r = (num >> 16) & 255;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return `rgba(${r},${g},${b},${alpha})`;
  }
  const rgbMatch = color.match(/^rgba?\(([^)]+)\)$/i);
  if (rgbMatch) {
    const parts = rgbMatch[1].split(',').map(part => part.trim());
    const [r, g, b] = parts;
    return `rgba(${r},${g},${b},${alpha})`;
  }
  return color;
}
function scoreColorFromPct(value, theme) {
  const palette = theme || themePalette();
  const pct = Number(value);
  if (!Number.isFinite(pct)) return palette.text3 || '#a1a6c2';
  if (pct >= 93) return palette.scoreExcellent || palette.green || '#34f58d';
  if (pct >= 80) return palette.scoreGood || '#9cf7cc';
  if (pct >= 75) return palette.scoreOk || palette.yellow || '#ffe45c';
  if (pct >= 50) return palette.scoreMid || palette.orange || '#f5874a';
  return palette.scoreLow || palette.red || '#f55a5a';
}
function scoreFillFromPct(value, theme, alpha) {
  return alphaColor(scoreColorFromPct(value, theme), alpha == null ? 0.82 : alpha);
}
function formatPlainNumber(value, decimals) {
  const num = Number(value);
  if (!Number.isFinite(num)) return '—';
  const rounded = Math.abs(num - Math.round(num)) < 0.05 ? Math.round(num) : roundTo(num, decimals == null ? 1 : decimals);
  return String(rounded).replace(/\.0$/, '');
}
function formatMetricValue(metric, value) {
  const num = Number(value);
  if (!Number.isFinite(num)) return '—';
  if (metric === 'pct') return formatPercent(num);
  if (metric === 'pontos') return `${formatPlainNumber(num, 1)} pts`;
  return `${formatPlainNumber(num, 1)} acertos`;
}
function formatMetricDelta(metric, value) {
  const num = Number(value);
  if (!Number.isFinite(num)) return '—';
  if (metric === 'pct') return formatDiff(num);
  const prefix = num > 0 ? '+' : num < 0 ? '-' : '';
  const abs = formatPlainNumber(Math.abs(num), 1);
  return `${prefix}${abs} ${metric === 'pontos' ? 'pts' : 'acertos'}`;
}
function metricValueToPct(metric, value, targetValue) {
  const num = Number(value);
  if (!Number.isFinite(num)) return null;
  if (metric === 'pct') return num;
  const target = Number(targetValue);
  if (!Number.isFinite(target) || target <= 0) return null;
  return roundTo((num / target) * 100, 1);
}
function formatSimDate(value){
  if(!value) return '—';
  const raw = String(value);
  const datePart = raw.includes('T') ? raw.split('T')[0] : raw.slice(0,10);
  const parts = datePart.split('-');
  if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return raw;
}

      </div>`;

  const feitosHtml = simsFeitos.length ? `

function salvarSimulado() {
  const nome  = document.getElementById('simNome')?.value.trim() || 'Simulado';
  const data  = document.getElementById('simData')?.value || CT._today();
  const pct   = parseFloat(document.getElementById('simNota')?.value);
  const obs   = document.getElementById('simObs')?.value.trim() || '';

  if (isNaN(pct) || pct < 0 || pct > 100) {
    const el = document.getElementById('simNota');
    if (el) { el.style.borderColor='var(--red)'; setTimeout(()=>el.style.borderColor='var(--border2)',1200); }
    return;
  }

  // Notas por matéria
  const materias = CT.getMaterias(cId);
  const notasMaterias = {};
  materias.forEach(m => {
    const val = parseFloat(document.getElementById('nm_'+m.id)?.value);
    if (!isNaN(val)) notasMaterias[m.id] = val;
  });

  const sim = {
    id: _editandoSimId || undefined,
    concursoId: cId,
    nome,
    criadoEm: data,
    pct,
    obs,
    notasMaterias: Object.keys(notasMaterias).length ? notasMaterias : null,
  };

  CT.saveSimulado(sim);
  document.getElementById('modalSim')?.remove();
  render();
}

function alternarCamposSimulado() {
  const tipo = document.getElementById('simTipo')?.value || 'realizado';
  const pendente = tipo === 'pendente';
  const baseGrid = document.getElementById('simBaseGrid');
  const dataWrap = document.getElementById('simDataWrap');
  const notaWrap = document.getElementById('simNotaWrap');
  const materiasWrap = document.getElementById('simMateriasWrap');
  const linkWrap = document.getElementById('simLinkWrap');
  const obsWrap = document.getElementById('simObsWrap');
  if (baseGrid) baseGrid.style.gridTemplateColumns = pendente ? '1fr' : '1fr 1fr';
  if (dataWrap) dataWrap.style.display = pendente ? 'none' : '';
  if (notaWrap) notaWrap.style.display = pendente ? 'none' : '';
  if (materiasWrap) materiasWrap.style.display = pendente ? 'none' : '';
  if (linkWrap) linkWrap.style.display = pendente ? '' : 'none';
  if (obsWrap) obsWrap.style.display = pendente ? 'none' : '';
}

salvarSimulado = function() {
  const nome  = document.getElementById('simNome')?.value.trim() || 'Simulado';
  const data  = document.getElementById('simData')?.value || CT._today();
  const tipo  = document.getElementById('simTipo')?.value || 'realizado';
  const link  = document.getElementById('simLink')?.value.trim() || '';
  const pct   = parseFloat(document.getElementById('simNota')?.value);
  const obs   = document.getElementById('simObs')?.value.trim() || '';

  if (tipo === 'realizado') {
    if (isNaN(pct) || pct < 0 || pct > 100) {
      const el = document.getElementById('simNota');
      if (el) { el.style.borderColor='var(--red)'; setTimeout(()=>el.style.borderColor='var(--border2)',1200); }
      return;
    }
  } else if (!link) {
    const el = document.getElementById('simLink');
    if (el) { el.style.borderColor='var(--red)'; setTimeout(()=>el.style.borderColor='var(--border2)',1200); }
    return;
  }

  const materias = CT.getMaterias(cId);
  const notasMaterias = {};
  if (tipo === 'realizado') {
    materias.forEach(m => {
      const val = parseFloat(document.getElementById('nm_'+m.id)?.value);
      if (!isNaN(val)) notasMaterias[m.id] = val;
    });
  }

  const anterior = _editandoSimId ? CT.getSimulados(cId).find(s => s.id === _editandoSimId) : null;
  const sim = {
    id: _editandoSimId || undefined,
    concursoId: cId,
    nome,
    criadoEm: data,
    tipo,
    link: tipo === 'pendente' ? link : (anterior?.link || ''),
    pct: tipo === 'realizado' ? pct : null,
    obs,
    notasMaterias: tipo === 'realizado' && Object.keys(notasMaterias).length ? notasMaterias : null,
  };

  CT.saveSimulado(sim);
  document.getElementById('modalSim')?.remove();
  render();
};

function deletarSimulado(id) {
  if (!confirm('Excluir este simulado?')) return;
  const sims = CT.getSimulados(cId).filter(s=>s.id!==id);
  localStorage.setItem('ct_simulados', JSON.stringify(CT.getSimulados().filter(s=>s.concursoId!==cId||s.id!==id)));
  render();
}

  const c = CT.getConcurso(cId);

function loadPainelProvaConfig() {

  try {
    const saved = localStorage.getItem('ct_config_prova_' + cId);
    if (!saved) return config;
    const parsed = JSON.parse(saved);
    if (parsed && (parsed.geral || parsed.especifico)) {

      if (parsed.especifico && parsed.especifico.length) config.groups.push({ id: 'mig_e', name: 'Conhecimentos Específicos', items: parsed.especifico });
      localStorage.setItem('ct_config_prova_' + cId, JSON.stringify(config));
      return config;
    }
    if (parsed && Array.isArray(parsed.groups)) config = parsed;
  } catch (e) {}

function getPainelMateriaInfo() {
  if (_painelMateriaInfoCache) return _painelMateriaInfoCache;

  const config = loadPainelProvaConfig();
  const materias = CT.getMaterias(cId);
  const materiasMap = new Map(materias.map(m => [String(m.id), m]));
  const entries = [];
  const metaByMateria = new Map();
  let totalQuestoes = 0;
  let totalPontos = 0;
  let ignoredBlocks = 0;
  let ignoredPontos = 0;

  (config.groups || []).forEach((group, groupIndex) => {
    if (group.type === 'redacao') {
      const pts = Number(group.pts || 0);
      if (!group.isClassificatoriaOnly && pts > 0) {
        ignoredBlocks += 1;
        ignoredPontos += pts;
      }
      return;
    }

    if (Array.isArray(group.items) && group.items.length) {
      group.items.forEach((item, itemIndex) => {
        const materia = materiasMap.get(String(item.id));
        const questoes = Math.max(0, Number(item.q || 0));
        const peso = Math.max(0, Number(item.w || 0));
        if (!materia || questoes <= 0) return;

        const pontosMax = roundTo(questoes * peso, 1);
        const key = `${group.id || 'g' + groupIndex}::${String(item.id)}::${itemIndex}`;
        entries.push({
          key,
          materiaId: String(item.id),
          nome: materia.nome,
          groupName: group.name || 'Bloco',
          questoes,
          peso,
          pontosMax
        });
        totalQuestoes += questoes;
        totalPontos += pontosMax;

        const atual = metaByMateria.get(String(item.id)) || { materiaId: String(item.id), nome: materia.nome, questoes: 0, pontosMax: 0 };
        atual.questoes += questoes;
        atual.pontosMax = roundTo(atual.pontosMax + pontosMax, 1);
        metaByMateria.set(String(item.id), atual);
      });
      return;
    }

    const blocoQuestoes = Math.max(0, Number(group.q || 0));
    const blocoPeso = Math.max(0, Number(group.w || 0));
    if (blocoQuestoes > 0) {
      ignoredBlocks += 1;
      ignoredPontos += blocoQuestoes * blocoPeso;
    }
  });

  _painelMateriaInfoCache = {
    hasConfig: !!((config.groups || []).length),
    entries,
    totalQuestoes,
    totalPontos: roundTo(totalPontos, 1),
    ignoredBlocks,
    ignoredPontos: roundTo(ignoredPontos, 1),
    metaByMateria
  };
  return _painelMateriaInfoCache;
}
function getMateriaOptionsFromData(simsFeitos) {
  const ordemAtual = new Map(CT.getMaterias(cId).map((m, index) => [String(m.id), index]));
  const nomes = new Map();

  simsFeitos.forEach(sim => {
    if (sim && sim.desempenhoPainel && Array.isArray(sim.desempenhoPainel.materias)) {
      sim.desempenhoPainel.materias.forEach(item => {
        if (!item || item.materiaId == null) return;
        nomes.set(String(item.materiaId), item.nome || nomes.get(String(item.materiaId)) || 'Matéria');
      });
    } else if (sim && sim.notasMaterias && typeof sim.notasMaterias === 'object') {
      Object.keys(sim.notasMaterias).forEach(id => {
        const materia = CT.getMateria(id);
        nomes.set(String(id), materia ? materia.nome : (nomes.get(String(id)) || 'Matéria'));
      });
    }
  });

  return Array.from(nomes.entries())
    .sort((a, b) => {
      const orderA = ordemAtual.has(a[0]) ? ordemAtual.get(a[0]) : 9999;
      const orderB = ordemAtual.has(b[0]) ? ordemAtual.get(b[0]) : 9999;
      if (orderA !== orderB) return orderA - orderB;
      return String(a[1]).localeCompare(String(b[1]), 'pt-BR');
    })
    .map(([id, nome]) => ({ id, nome }));
}
function getMateriaMetricSnapshot(sim, materiaId, metric, metaAtual) {
  let materia = null;
  if (sim && sim.desempenhoPainel && Array.isArray(sim.desempenhoPainel.materias)) {
    materia = sim.desempenhoPainel.materias.find(item => String(item.materiaId) === String(materiaId)) || null;
  } else if (metric === 'pct' && sim && sim.notasMaterias && sim.notasMaterias[materiaId] != null) {
    materia = { pct: Number(sim.notasMaterias[materiaId]) };
  }
  if (!materia) return null;

  const value = metric === 'acertos'
    ? Number(materia.acertos)
    : metric === 'pontos'
      ? Number(materia.pontosObtidos)
      : Number(materia.pct);
  if (!Number.isFinite(value)) return null;

  const targetValue = metric === 'pct'
    ? 100
    : metric === 'acertos'
      ? Number(materia.questoes ?? metaAtual?.questoes)
      : Number(materia.pontosMax ?? metaAtual?.pontosMax);

  return {
    sim,
    value: roundTo(value, 1),
    pctValue: Number.isFinite(Number(materia.pct)) ? roundTo(Number(materia.pct), 1) : null,
    pointsValue: Number.isFinite(Number(materia.pontosObtidos)) ? roundTo(Number(materia.pontosObtidos), 1) : null,
    pctRef: metricValueToPct(metric, value, targetValue),
    targetValue
  };
}
function buildMateriaOverviewState(metric) {
  const painelInfo = getPainelMateriaInfo();
  const ordemAtual = new Map(CT.getMaterias(cId).map((m, index) => [String(m.id), index]));
  const opcoesMap = new Map(getMateriaOptionsFromData(_simuladosFeitosCache).map(item => [String(item.id), item.nome]));

  painelInfo.metaByMateria.forEach((meta, id) => {
    if (!opcoesMap.has(String(id))) opcoesMap.set(String(id), meta.nome || 'Matéria');
  });

  const items = Array.from(opcoesMap.entries())
    .sort((a, b) => {
      const orderA = ordemAtual.has(a[0]) ? ordemAtual.get(a[0]) : 9999;
      const orderB = ordemAtual.has(b[0]) ? ordemAtual.get(b[0]) : 9999;
      if (orderA !== orderB) return orderA - orderB;
      return String(a[1]).localeCompare(String(b[1]), 'pt-BR');
    })
    .map(([materiaId, nome]) => {
      const metaAtual = painelInfo.metaByMateria.get(String(materiaId)) || null;
      const history = _simuladosFeitosCache
        .map(sim => getMateriaMetricSnapshot(sim, materiaId, metric, metaAtual))
        .filter(Boolean);

      if (!history.length) return null;

      const ultimo = history[history.length - 1];
      const anterior = history.length >= 2 ? history[history.length - 2] : null;
      const media = roundTo(history.reduce((acc, item) => acc + Number(item.value || 0), 0) / history.length, 1);
      const deltaAnterior = anterior ? roundTo(Number(ultimo.value || 0) - Number(anterior.value || 0), 1) : null;
      const deltaMedia = roundTo(Number(ultimo.value || 0) - Number(media || 0), 1);
      const deltaPointsAnterior = anterior && ultimo.pointsValue != null && anterior.pointsValue != null
        ? roundTo(Number(ultimo.pointsValue || 0) - Number(anterior.pointsValue || 0), 1)
        : null;
      const mediaPointsList = history.map(item => item.pointsValue).filter(value => value != null);
      const mediaPoints = mediaPointsList.length ? roundTo(mediaPointsList.reduce((acc, value) => acc + Number(value || 0), 0) / mediaPointsList.length, 1) : null;
      const deltaPointsMedia = ultimo.pointsValue != null && mediaPoints != null
        ? roundTo(Number(ultimo.pointsValue || 0) - Number(mediaPoints || 0), 1)
        : null;

      return {
        materiaId: String(materiaId),
        nome,
        ultimo,
        anterior,
        media,
        deltaAnterior,
        deltaMedia,
        mediaPoints,
        deltaPointsAnterior,
        deltaPointsMedia,
        pctRef: ultimo.pctRef,
        targetValue: ultimo.targetValue ?? (metric === 'pct' ? 100 : null),
        historyCount: history.length
      };
    })
    .filter(Boolean)
    .sort((a, b) => {
      const pctA = Number.isFinite(Number(a.pctRef)) ? Number(a.pctRef) : -1;
      const pctB = Number.isFinite(Number(b.pctRef)) ? Number(b.pctRef) : -1;
      if (pctB !== pctA) return pctB - pctA;
      return String(a.nome).localeCompare(String(b.nome), 'pt-BR');
    });

  const maxValue = Math.max(
    ...items.flatMap(item => [item.ultimo?.value, item.anterior?.value]).filter(value => Number.isFinite(Number(value))).map(Number),
    metric === 'pct' ? 100 : 0
  );

  return {
    metric,
    items,
    hasData: !!items.length,
    maxAxis: metric === 'pct' ? 100 : Math.max(5, roundTo(maxValue * 1.18, metric === 'pontos' ? 1 : 0))
  };
}

        ctx2.fillStyle = scoreColorFromPct(item.pctRef, theme);
        ctx2.fillText(formatMetricValue(metric, item.ultimo.value), x, bar.y);
      });
      ctx2.restore();
    }
  };

  const datasets = [{
    label: 'Último simulado',
    data: chartState.items.map(item => item.ultimo.value),
    backgroundColor: chartState.items.map(item => scoreFillFromPct(item.pctRef, theme, 0.82)),
    borderColor: chartState.items.map(item => scoreColorFromPct(item.pctRef, theme)),
    borderWidth: 1.5,
    borderRadius: 8,
    borderSkipped: false,

  }];

      backgroundColor: alphaColor(theme.accent2, 0.34),
      borderColor: alphaColor(theme.accent2, 0.92),
      borderWidth: 1.3,
      borderRadius: 8,
      borderSkipped: false,
      barThickness: 12
    });
  }

  _chartMateria = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    plugins: [valueLabelPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: {
          display: true,
          labels: { color: theme.chartAxisStrong, font: { size: 11 }, usePointStyle: true, boxWidth: 10, boxHeight: 10 }
        },
        tooltip: {
          backgroundColor: theme.tooltipBg,
          borderColor: theme.tooltipBorder,
          borderWidth: 1,
          titleColor: theme.tooltipTitle,
          bodyColor: theme.tooltipBody,
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            title(items) {
              return chartState.items[items[0].dataIndex]?.nome || 'Matéria';
            },
            label(ctx2) {
              return ` ${ctx2.dataset.label}: ${formatMetricValue(metric, ctx2.raw)}`;
            },
            afterBody(items) {
              const item = chartState.items[items[0].dataIndex];
              if (!item) return [];
              const extra = [];
              if (item.deltaAnterior != null) extra.push(`Último vs. anterior: ${formatMetricDelta(metric, item.deltaAnterior)}`);
              if (item.pctRef != null && metric !== 'pct') extra.push(`Aproveitamento atual: ${formatPercent(item.pctRef)}`);
              return extra;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: theme.chartAxis,
            font: { size: 10 },
            callback(value) {
              if (metric === 'pct') return value + '%';
              if (metric === 'pontos') return formatPlainNumber(value, 1);
              return value;
            }
          },
          grid: { display: false },
          border: { display: false },
          min: 0,
          max: metric === 'pct' ? 100 : chartState.maxAxis
        },
        y: {
          ticks: { color: theme.chartAxisStrong, font: { size: 11 } },
          grid: { display: false },
          border: { display: false }
        }
      }
    }

function renderGraficoGeral(simsFeitos, tendencia, media, notaCorte) {

        },

            },
            label(ctx2) {

              if (ctx2.dataset.label === 'Média') return ` Média geral: ${formatPercent(ctx2.raw)}`;

      scales: {
        x: {
          ticks: { color: theme.chartAxisStrong, font: { size: 10 }, maxRotation: 0, minRotation: 0 },
          grid: { display: false },
          border: { display: false }
        },
        y: {
          ticks: { color: theme.chartAxis, font: { size: 10 }, callback: value => value + '%' },
          grid: { display: false },
          border: { display: false },
          min: 0,
          max: 100
        }

    }
  });

render = function() {

function atualizarResumoPainelSimulado() {
  const painelInfo = getPainelMateriaInfo();
  const summary = document.getElementById('simPainelSummary');
  if (!summary || !painelInfo.entries.length) return;

  let preenchidos = 0;
  let totalAcertos = 0;
  let totalPontos = 0;

  painelInfo.entries.forEach((entry, index) => {
    const input = document.getElementById('spaInput_' + index);
    const pctEl = document.getElementById('spaPct_' + index);
    const ptsEl = document.getElementById('spaPts_' + index);
    if (!input || !pctEl || !ptsEl) return;

    const raw = String(input.value || '').trim();
    if (!raw) {
      pctEl.textContent = '—';
      pctEl.style.color = 'var(--text2)';
      ptsEl.textContent = '—';
      ptsEl.style.color = 'var(--text2)';
      return;
    }

    let acertos = Number(raw.replace(',', '.'));
    if (!Number.isFinite(acertos)) {
      pctEl.textContent = 'Inválido';
      pctEl.style.color = 'var(--red)';
      ptsEl.textContent = '—';
      ptsEl.style.color = 'var(--text2)';
      return;
    }

    acertos = Math.max(0, Math.min(entry.questoes, Math.round(acertos)));
    input.value = String(acertos);

    const pct = entry.questoes ? roundTo((acertos / entry.questoes) * 100, 1) : 0;
    const pontos = roundTo(acertos * entry.peso, 1);
    preenchidos += 1;
    totalAcertos += acertos;
    totalPontos += pontos;
    pctEl.textContent = formatPercent(pct);
    pctEl.style.color = pctColor(pct);
    ptsEl.textContent = `${formatPoints(pontos)} pts`;
    ptsEl.style.color = 'var(--text2)';
  });

  const faltando = painelInfo.entries.length - preenchidos;
  const pctTotal = painelInfo.totalQuestoes > 0 ? roundTo((totalAcertos / painelInfo.totalQuestoes) * 100, 1) : 0;
  const pctPonderada = painelInfo.totalPontos > 0 ? roundTo((totalPontos / painelInfo.totalPontos) * 100, 1) : 0;
  summary.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px">Resumo automático</div>
        <div style="font-size:18px;font-weight:800;color:${pctColor(pctTotal)}">${formatPercent(pctTotal)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${totalAcertos}/${painelInfo.totalQuestoes} acertos • ${formatPoints(totalPontos)}/${formatPoints(painelInfo.totalPontos)} pts</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">Nota ponderada: ${formatPercent(pctPonderada)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.8px">Campos preenchidos</div>
        <div style="font-size:16px;font-weight:700;color:${faltando === 0 ? 'var(--green)' : 'var(--text)'}">${preenchidos}/${painelInfo.entries.length}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${faltando > 0 ? `${faltando} bloco(s) ainda sem acertos` : 'Tudo pronto para calcular'}</div>
      </div>
    </div>
    ${painelInfo.ignoredBlocks ? `<div style="margin-top:10px;font-size:11px;color:var(--text3);line-height:1.6">Obs.: o cálculo automático considera apenas as matérias vinculadas no Painel da Prova. ${painelInfo.ignoredBlocks} bloco(s) sem matéria definida ou redação ficaram fora desta conta.</div>` : ''}
  `;
}
function buildPainelSnapshotFromModal() {
  const painelInfo = getPainelMateriaInfo();
  const items = [];
  const materiasMap = new Map();
  const notasMaterias = {};
  let totalAcertos = 0;
  let totalPontos = 0;

  for (let index = 0; index < painelInfo.entries.length; index++) {
    const entry = painelInfo.entries[index];
    const input = document.getElementById('spaInput_' + index);
    const raw = String(input?.value || '').trim();
    if (!raw) return { ok: false, field: input, motivo: 'Preencha os acertos de todas as matérias para usar o cálculo automático.' };

    const acertos = Number(raw.replace(',', '.'));
    if (!Number.isFinite(acertos) || acertos < 0 || acertos > entry.questoes) {
      return { ok: false, field: input, motivo: `Os acertos de ${entry.nome} devem ficar entre 0 e ${entry.questoes}.` };
    }

    const acertosNormalizados = Math.round(acertos);
    const erros = entry.questoes - acertosNormalizados;
    const pct = entry.questoes ? roundTo((acertosNormalizados / entry.questoes) * 100, 1) : 0;
    const pontosObtidos = roundTo(acertosNormalizados * entry.peso, 1);
    items.push({
      key: entry.key,
      materiaId: entry.materiaId,
      nome: entry.nome,
      groupName: entry.groupName,
      questoes: entry.questoes,
      peso: entry.peso,
      acertos: acertosNormalizados,
      erros,
      pct,
      pontosObtidos,
      pontosMax: entry.pontosMax
    });
    totalAcertos += acertosNormalizados;
    totalPontos += pontosObtidos;

    const agregado = materiasMap.get(entry.materiaId) || {
      materiaId: entry.materiaId,
      nome: entry.nome,
      questoes: 0,
      acertos: 0,
      erros: 0,
      pontosObtidos: 0,
      pontosMax: 0
    };
    agregado.questoes += entry.questoes;
    agregado.acertos += acertosNormalizados;
    agregado.erros += erros;
    agregado.pontosObtidos = roundTo(agregado.pontosObtidos + pontosObtidos, 1);
    agregado.pontosMax = roundTo(agregado.pontosMax + entry.pontosMax, 1);
    materiasMap.set(entry.materiaId, agregado);
  }

  const materias = Array.from(materiasMap.values()).map(item => {
    const pct = item.questoes ? roundTo((item.acertos / item.questoes) * 100, 1) : 0;
    notasMaterias[item.materiaId] = pct;
    return { ...item, pct };
  });
  const pctTotal = painelInfo.totalQuestoes ? roundTo((totalAcertos / painelInfo.totalQuestoes) * 100, 1) : 0;
  const pctPonderada = painelInfo.totalPontos ? roundTo((totalPontos / painelInfo.totalPontos) * 100, 1) : 0;

  return {
    ok: true,
    pct: pctTotal,
    notasMaterias,
    snapshot: {
      version: 1,
      origem: 'painel-prova',
      totalAcertos,
      totalQuestoes: painelInfo.totalQuestoes,
      totalPontosObtidos: roundTo(totalPontos, 1),
      totalPontosMax: painelInfo.totalPontos,
      pct: pctTotal,
      pctPonderada,
      ignoredBlocks: painelInfo.ignoredBlocks,
      ignoredPontos: painelInfo.ignoredPontos,
      items,
      materias
    }
  };
}

salvarSimulado = function() {
  const nome = document.getElementById('simNome')?.value.trim() || 'Simulado';
  const data = document.getElementById('simData')?.value || CT._today();
  const tipo = document.getElementById('simTipo')?.value || 'realizado';

  const obs = document.getElementById('simObs')?.value.trim() || '';
  const anterior = _editandoSimId ? CT.getSimulados(cId).find(sim => sim.id === _editandoSimId) : null;

  let pct = null;
  let notasMaterias = null;
  let desempenhoPainel = null;
  let acertosTotal = null;
  let questoesTotal = null;
  let pontosObtidos = null;
  let pontosMax = null;

  if (tipo === 'pendente') {
    if (!link) {
      highlightInput(document.getElementById('simLink'));
      return;
    }
  } else if (modo === 'automatico') {
    const result = buildPainelSnapshotFromModal();
    if (!result.ok) {
      highlightInput(result.field);
      if (result.motivo) alert(result.motivo);

    }
    pct = result.pct;
    notasMaterias = Object.keys(result.notasMaterias).length ? result.notasMaterias : null;
    desempenhoPainel = result.snapshot;
    acertosTotal = result.snapshot.totalAcertos;
    questoesTotal = result.snapshot.totalQuestoes;
    pontosObtidos = result.snapshot.totalPontosObtidos;
    pontosMax = result.snapshot.totalPontosMax;
  } else {
    const notaEl = document.getElementById('simNota');
    const pctManual = Number(notaEl?.value);
    if (!Number.isFinite(pctManual) || pctManual < 0 || pctManual > 100) {
      highlightInput(notaEl);
      return;
    }
    pct = roundTo(pctManual, 1);

    const materias = CT.getMaterias(cId);
    const mapa = {};
    materias.forEach(materia => {
      const val = Number(document.getElementById('nm_' + materia.id)?.value);

    });
    notasMaterias = Object.keys(mapa).length ? mapa : null;
  }

  const sim = {
    id: _editandoSimId || undefined,
    concursoId: cId,
    nome,

    acertosTotal: tipo === 'realizado' ? acertosTotal : null,
    questoesTotal: tipo === 'realizado' ? questoesTotal : null,
    pontosObtidos: tipo === 'realizado' ? pontosObtidos : null,
    pontosMax: tipo === 'realizado' ? pontosMax : null
  };

  CT.saveSimulado(sim);
  document.getElementById('modalSim')?.remove();

function normalizePainelSimConfig(rawConfig) {
  const config = rawConfig && typeof rawConfig === 'object' ? { ...rawConfig } : {};
  if (config.geral || config.especifico) {
    const groups = [];
    if (Array.isArray(config.geral) && config.geral.length) groups.push({ id: 'mig_g', name: 'Conhecimentos Gerais', items: config.geral });
    if (Array.isArray(config.especifico) && config.especifico.length) groups.push({ id: 'mig_e', name: 'Conhecimentos Específicos', items: config.especifico });
    config.groups = groups;
  }
  config.groups = Array.isArray(config.groups) ? config.groups : [];
  config.scoringMode = config.scoringMode === 'cebraspe' ? 'cebraspe' : 'tradicional';
  const penalty = Number(config.errorPenalty);
  config.errorPenalty = Number.isFinite(penalty) && penalty >= 0 ? roundTo(penalty, 1) : 1;
  return config;
}

function loadPainelProvaConfig() {
  try {
    const saved = localStorage.getItem('ct_config_prova_' + cId);
    if (!saved) return normalizePainelSimConfig({ groups: [] });
    return normalizePainelSimConfig(JSON.parse(saved));
  } catch (e) {
    return normalizePainelSimConfig({ groups: [] });
  }
}

function formatPainelPenaltyPt(value) {
  const num = Number(value);
  if (!Number.isFinite(num)) return '0';
  const rounded = Math.abs(num - Math.round(num)) < 0.05 ? Math.round(num) : roundTo(num, 1);
  return ptText(String(rounded).replace(/\.0$/, ''));
}

function getPainelMateriaInfo() {

  const materias = CT.getMaterias(cId);
  const materiasMap = new Map(materias.map(m => [String(m.id), m]));
  const entries = [];
  const metaByMateria = new Map();
  const isCespe = config.scoringMode === 'cebraspe';
  const errorPenalty = Number(config.errorPenalty || 1);
  let totalQuestoes = 0;
  let totalPontos = 0;
  let ignoredBlocks = 0;
  let ignoredPontos = 0;

  (config.groups || []).forEach((group, groupIndex) => {
    if (group.type === 'redacao') {
      const pts = Number(group.pts || 0);
      if (!group.isClassificatoriaOnly && pts > 0) {
        ignoredBlocks += 1;
        ignoredPontos += pts;
      }
      return;
    }

    if (Array.isArray(group.items) && group.items.length) {
      group.items.forEach((item, itemIndex) => {
        const materia = materiasMap.get(String(item.id));
        const questoes = Math.max(0, Number(item.q || 0));
        const peso = Math.max(0, Number(item.w || 0));
        if (!materia || questoes <= 0) return;

        const pontosMax = roundTo(isCespe ? questoes : (questoes * peso), 1);
        const key = `${group.id || 'g' + groupIndex}::${String(item.id)}::${itemIndex}`;
        entries.push({
          key,
          materiaId: String(item.id),
          nome: materia.nome,
          groupName: group.name || 'Bloco',
          questoes,
          peso: isCespe ? 1 : peso,
          pontosMax,
          scoringMode: config.scoringMode,
          errorPenalty
        });
        totalQuestoes += questoes;
        totalPontos += pontosMax;

        const atual = metaByMateria.get(String(item.id)) || {
          materiaId: String(item.id),
          nome: materia.nome,
          questoes: 0,
          pontosMax: 0,
          scoringMode: config.scoringMode,
          errorPenalty
        };
        atual.questoes += questoes;
        atual.pontosMax = roundTo(atual.pontosMax + pontosMax, 1);
        metaByMateria.set(String(item.id), atual);
      });
      return;
    }

    const blocoQuestoes = Math.max(0, Number(group.q || 0));
    const blocoPeso = Math.max(0, Number(group.w || 0));
    if (blocoQuestoes > 0) {
      ignoredBlocks += 1;
      ignoredPontos += isCespe ? blocoQuestoes : (blocoQuestoes * blocoPeso);
    }
  });

  _painelMateriaInfoCache = {
    hasConfig: !!((config.groups || []).length),
    scoringMode: config.scoringMode,
    errorPenalty,
    entries,
    totalQuestoes,
    totalPontos: roundTo(totalPontos, 1),
    ignoredBlocks,
    ignoredPontos: roundTo(ignoredPontos, 1),
    metaByMateria
  };
  return _painelMateriaInfoCache;
}

function readPainelAutoEntryState(entry, index) {
  const isCespe = entry.scoringMode === 'cebraspe';
  const acertosInput = document.getElementById('spaInput_' + index);
  const brancosInput = document.getElementById('spaBlank_' + index);
  const rawAcertos = String(acertosInput?.value || '').trim();
  const rawBrancos = String(brancosInput?.value || '').trim();

  if (isCespe) {
    if (!rawAcertos && !rawBrancos) return { empty: true, acertosInput, brancosInput };
    if (!rawAcertos || !rawBrancos) {
      return {
        ok: false,
        field: !rawAcertos ? acertosInput : brancosInput,
        motivo: `Preencha acertos e em branco de ${entry.nome}.`
      };
    }

    const acertos = Number(rawAcertos.replace(',', '.'));
    const emBranco = Number(rawBrancos.replace(',', '.'));
    if (!Number.isFinite(acertos) || acertos < 0 || acertos > entry.questoes) {
      return { ok: false, field: acertosInput, motivo: `Os acertos de ${entry.nome} devem ficar entre 0 e ${entry.questoes}.` };
    }
    if (!Number.isFinite(emBranco) || emBranco < 0 || emBranco > entry.questoes) {
      return { ok: false, field: brancosInput, motivo: `As questões em branco de ${entry.nome} devem ficar entre 0 e ${entry.questoes}.` };
    }

    const acertosNormalizados = Math.round(acertos);
    const emBrancoNormalizado = Math.round(emBranco);
    if ((acertosNormalizados + emBrancoNormalizado) > entry.questoes) {
      return {
        ok: false,
        field: brancosInput,
        motivo: `Em ${entry.nome}, acertos + em branco não podem ultrapassar ${entry.questoes} questões.`
      };
    }

    const erros = entry.questoes - acertosNormalizados - emBrancoNormalizado;
    const pct = entry.questoes ? roundTo((acertosNormalizados / entry.questoes) * 100, 1) : 0;
    const pontosObtidos = roundTo(acertosNormalizados - (erros * Number(entry.errorPenalty || 1)), 1);
    return {
      ok: true,
      acertos: acertosNormalizados,
      emBranco: emBrancoNormalizado,
      erros,
      pct,
      pontosObtidos,
      pontosMax: entry.pontosMax,
      field: acertosInput
    };
  }

  if (!rawAcertos) return { empty: true, acertosInput };
  const acertos = Number(rawAcertos.replace(',', '.'));
  if (!Number.isFinite(acertos) || acertos < 0 || acertos > entry.questoes) {
    return { ok: false, field: acertosInput, motivo: `Os acertos de ${entry.nome} devem ficar entre 0 e ${entry.questoes}.` };
  }

  const acertosNormalizados = Math.round(acertos);
  const erros = entry.questoes - acertosNormalizados;
  const pct = entry.questoes ? roundTo((acertosNormalizados / entry.questoes) * 100, 1) : 0;
  const pontosObtidos = roundTo(acertosNormalizados * entry.peso, 1);
  return {
    ok: true,
    acertos: acertosNormalizados,
    emBranco: 0,
    erros,
    pct,
    pontosObtidos,
    pontosMax: entry.pontosMax,
    field: acertosInput
  };
}

function buildMateriaOverviewState(metric) {
  const painelInfo = getPainelMateriaInfo();
  const ordemAtual = new Map(CT.getMaterias(cId).map((m, index) => [String(m.id), index]));
  const opcoesMap = new Map(getMateriaOptionsFromData(_simuladosFeitosCache).map(item => [String(item.id), item.nome]));

  painelInfo.metaByMateria.forEach((meta, id) => {
    if (!opcoesMap.has(String(id))) opcoesMap.set(String(id), meta.nome || 'Matéria');
  });

  const items = Array.from(opcoesMap.entries())
    .sort((a, b) => {
      const orderA = ordemAtual.has(a[0]) ? ordemAtual.get(a[0]) : 9999;
      const orderB = ordemAtual.has(b[0]) ? ordemAtual.get(b[0]) : 9999;
      if (orderA !== orderB) return orderA - orderB;
      return String(a[1]).localeCompare(String(b[1]), 'pt-BR');
    })
    .map(([materiaId, nome]) => {
      const metaAtual = painelInfo.metaByMateria.get(String(materiaId)) || null;
      const history = _simuladosFeitosCache
        .map(sim => getMateriaMetricSnapshot(sim, materiaId, metric, metaAtual))
        .filter(Boolean);

      if (!history.length) return null;

      const ultimo = history[history.length - 1];
      const anterior = history.length >= 2 ? history[history.length - 2] : null;
      const media = roundTo(history.reduce((acc, item) => acc + Number(item.value || 0), 0) / history.length, 1);
      const deltaAnterior = anterior ? roundTo(Number(ultimo.value || 0) - Number(anterior.value || 0), 1) : null;
      const deltaMedia = roundTo(Number(ultimo.value || 0) - Number(media || 0), 1);
      const deltaPointsAnterior = anterior && ultimo.pointsValue != null && anterior.pointsValue != null
        ? roundTo(Number(ultimo.pointsValue || 0) - Number(anterior.pointsValue || 0), 1)
        : null;
      const mediaPointsList = history.map(item => item.pointsValue).filter(value => value != null);
      const mediaPoints = mediaPointsList.length ? roundTo(mediaPointsList.reduce((acc, value) => acc + Number(value || 0), 0) / mediaPointsList.length, 1) : null;
      const deltaPointsMedia = ultimo.pointsValue != null && mediaPoints != null
        ? roundTo(Number(ultimo.pointsValue || 0) - Number(mediaPoints || 0), 1)
        : null;

      return {
        materiaId: String(materiaId),
        nome,
        ultimo,
        anterior,
        media,
        deltaAnterior,
        deltaMedia,
        mediaPoints,
        deltaPointsAnterior,
        deltaPointsMedia,
        pctRef: ultimo.pctRef,
        targetValue: ultimo.targetValue ?? (metric === 'pct' ? 100 : null),
        historyCount: history.length
      };
    })
    .filter(Boolean)
    .sort((a, b) => {
      const pctA = Number.isFinite(Number(a.pctRef)) ? Number(a.pctRef) : -1;
      const pctB = Number.isFinite(Number(b.pctRef)) ? Number(b.pctRef) : -1;
      if (pctB !== pctA) return pctB - pctA;
      return String(a.nome).localeCompare(String(b.nome), 'pt-BR');
    });

  const numericValues = items
    .flatMap(item => [item.ultimo?.value, item.anterior?.value])
    .filter(value => Number.isFinite(Number(value)))
    .map(Number);
  const maxValue = numericValues.length ? Math.max(...numericValues, metric === 'pct' ? 100 : 0) : (metric === 'pct' ? 100 : 0);
  const minValue = metric === 'pontos' && numericValues.length ? Math.min(...numericValues, 0) : 0;

  return {
    metric,
    items,
    hasData: !!items.length,
    minAxis: metric === 'pontos' ? Math.min(0, roundTo(minValue * 1.18, 1)) : 0,
    maxAxis: metric === 'pct' ? 100 : Math.max(5, roundTo((maxValue > 0 ? maxValue : 0) * 1.18, 1))
  };
}

function renderGraficoMateria() {
  const wrap = document.getElementById('simMateriaChartWrap');
  const metricSelect = document.getElementById('simMateriaMetric');
  const stage = document.getElementById('simMateriaChartStage');
  const sub = document.getElementById('simMateriaChartSub');
  const resumo = document.getElementById('simMateriaResumo');
  if (!wrap || !metricSelect || !stage || !sub) return;

  const metric = metricSelect.value || 'pct';
  const chartState = buildMateriaOverviewState(metric);

  wrap.style.display = '';
  if (_chartMateria) {
    _chartMateria.destroy();
    _chartMateria = null;
  }

  if (!chartState.hasData) {
    stage.style.height = '260px';
    stage.innerHTML = '<div class="sim-chart-empty">Ainda não há dados detalhados por matéria nos simulados registrados.</div>';
    sub.textContent = 'Registre acertos por matéria para liberar o raio-x completo.';
    if (resumo) resumo.innerHTML = '';
    return;
  }

  stage.style.height = Math.max(320, Math.min(620, 110 + (chartState.items.length * 48))) + 'px';
  stage.innerHTML = '<canvas id="chartSimMateria"></canvas>';
  const totalComAnterior = chartState.items.filter(item => item.deltaAnterior != null).length;
  sub.textContent = [
    `${chartState.items.length} matéria(s) analisadas`,
    metric === 'pct' ? 'comparativo por percentual' : metric === 'acertos' ? 'comparativo por acertos' : 'comparativo por pontos',
    `${totalComAnterior} com comparação ao simulado anterior`
  ].join(' • ');

  const theme = themePalette();
  const ctx = document.getElementById('chartSimMateria').getContext('2d');
  const labels = chartState.items.map(item => item.nome.length > 26 ? item.nome.slice(0, 26) + '...' : item.nome);
  const temAnterior = chartState.items.some(item => item.anterior);
  const valueLabelPlugin = {
    id: 'simMateriaOverviewLabels',
    afterDatasetsDraw(chart) {
      const meta = chart.getDatasetMeta(0);
      const ctx2 = chart.ctx;
      ctx2.save();
      ctx2.font = '700 10px Inter';
      ctx2.textBaseline = 'middle';
      meta.data.forEach((bar, index) => {
        const item = chartState.items[index];
        const rawValue = Number(item?.ultimo?.value);
        if (!item || !Number.isFinite(rawValue)) return;
        const chartArea = chart.chartArea;
        const isNegative = rawValue < 0;
        const x = isNegative
          ? Math.max(bar.x - 10, chartArea.left + 10)
          : Math.min(bar.x + 10, chartArea.right - 10);
        ctx2.textAlign = isNegative ? 'right' : (x >= chartArea.right - 24 ? 'right' : 'left');
        ctx2.fillStyle = scoreColorFromPct(item.pctRef, theme);
        ctx2.fillText(formatMetricValue(metric, rawValue), x, bar.y);
      });
      ctx2.restore();
    }
  };

  const datasets = [{
    label: 'Último simulado',
    data: chartState.items.map(item => item.ultimo.value),
    backgroundColor: chartState.items.map(item => scoreFillFromPct(item.pctRef, theme, 0.82)),
    borderColor: chartState.items.map(item => scoreColorFromPct(item.pctRef, theme)),
    borderWidth: 1.5,
    borderRadius: 8,
    borderSkipped: false,
    barThickness: 14
  }];

  if (temAnterior) {
    datasets.push({
      label: 'Simulado anterior',
      data: chartState.items.map(item => item.anterior ? item.anterior.value : null),
      backgroundColor: alphaColor(theme.accent2, 0.34),
      borderColor: alphaColor(theme.accent2, 0.92),
      borderWidth: 1.3,
      borderRadius: 8,
      borderSkipped: false,
      barThickness: 12
    });
  }

  _chartMateria = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    plugins: [valueLabelPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: {
          display: true,
          labels: { color: theme.chartAxisStrong, font: { size: 11 }, usePointStyle: true, boxWidth: 10, boxHeight: 10 }
        },
        tooltip: {
          backgroundColor: theme.tooltipBg,
          borderColor: theme.tooltipBorder,
          borderWidth: 1,
          titleColor: theme.tooltipTitle,
          bodyColor: theme.tooltipBody,
          padding: 12,
          cornerRadius: 10,
          callbacks: {
            title(items) {
              return chartState.items[items[0].dataIndex]?.nome || 'Matéria';
            },
            label(ctx2) {
              return ` ${ctx2.dataset.label}: ${formatMetricValue(metric, ctx2.raw)}`;
            },
            afterBody(items) {
              const item = chartState.items[items[0].dataIndex];
              if (!item) return [];
              const extra = [];
              if (item.deltaAnterior != null) extra.push(`Último vs. anterior: ${formatMetricDelta(metric, item.deltaAnterior)}`);
              if (item.pctRef != null && metric !== 'pct') extra.push(`Aproveitamento atual: ${formatPercent(item.pctRef)}`);
              return extra;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: theme.chartAxis,
            font: { size: 10 },
            callback(value) {
              if (metric === 'pct') return value + '%';
              if (metric === 'pontos') return formatPlainNumber(value, 1);
              return value;
            }
          },
          grid: { display: false },
          border: { display: false },
          min: metric === 'pontos' ? chartState.minAxis : 0,
          max: metric === 'pct' ? 100 : chartState.maxAxis
        },
        y: {
          ticks: { color: theme.chartAxisStrong, font: { size: 11 } },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  });
  renderMateriaResumo(chartState, metric);
}

function atualizarResumoPainelSimulado() {
  const painelInfo = getPainelMateriaInfo();
  const summary = document.getElementById('simPainelSummary');
  if (!summary || !painelInfo.entries.length) return;

  const isCespe = painelInfo.scoringMode === 'cebraspe';
  let preenchidos = 0;
  let totalAcertos = 0;
  let totalEmBranco = 0;
  let totalErros = 0;
  let totalPontos = 0;

  painelInfo.entries.forEach((entry, index) => {
    const pctEl = document.getElementById('spaPct_' + index);
    const ptsEl = document.getElementById('spaPts_' + index);
    const errEl = document.getElementById('spaErr_' + index);
    if (!pctEl || !ptsEl) return;

    const state = readPainelAutoEntryState(entry, index);
    if (state.empty) {
      pctEl.textContent = '—';
      pctEl.style.color = 'var(--text2)';
      ptsEl.textContent = '—';
      ptsEl.style.color = 'var(--text2)';
      if (errEl) {
        errEl.textContent = '—';
        errEl.style.color = 'var(--text2)';
      }
      return;
    }

    if (!state.ok) {
      pctEl.textContent = 'Inválido';
      pctEl.style.color = 'var(--red)';
      ptsEl.textContent = '—';
      ptsEl.style.color = 'var(--text2)';
      if (errEl) {
        errEl.textContent = '—';
        errEl.style.color = 'var(--text2)';
      }
      return;
    }

    preenchidos += 1;
    totalAcertos += state.acertos;
    totalEmBranco += state.emBranco || 0;
    totalErros += state.erros || 0;
    totalPontos += state.pontosObtidos;
    pctEl.textContent = formatPercent(state.pct);
    pctEl.style.color = pctColor(state.pct);
    ptsEl.textContent = `${formatPoints(state.pontosObtidos)} pts`;
    ptsEl.style.color = state.pontosObtidos < 0 ? 'var(--red)' : 'var(--text2)';
    if (errEl) {
      errEl.textContent = `${state.erros}`;
      errEl.style.color = state.erros > 0 ? 'var(--orange)' : 'var(--text2)';
    }
  });

  const faltando = painelInfo.entries.length - preenchidos;
  const pctTotal = painelInfo.totalQuestoes > 0 ? roundTo((totalAcertos / painelInfo.totalQuestoes) * 100, 1) : 0;
  const pctPonderada = painelInfo.totalPontos > 0 ? roundTo((totalPontos / painelInfo.totalPontos) * 100, 1) : 0;

  summary.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px">Resumo automático</div>
        <div style="font-size:18px;font-weight:800;color:${pctColor(pctTotal)}">${formatPercent(pctTotal)}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">
          ${isCespe
            ? `${totalAcertos}/${painelInfo.totalQuestoes} acertos • ${totalEmBranco} em branco • ${totalErros} erros`
            : `${totalAcertos}/${painelInfo.totalQuestoes} acertos • ${formatPoints(totalPontos)}/${formatPoints(painelInfo.totalPontos)} pts`}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">
          ${isCespe
            ? `Nota CESPE: <span style="color:${totalPontos < 0 ? 'var(--red)' : 'var(--text2)'};font-weight:700">${formatPoints(totalPontos)}/${formatPoints(painelInfo.totalPontos)} pts</span>`
            : `Nota ponderada: ${formatPercent(pctPonderada)}`}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.8px">Campos preenchidos</div>
        <div style="font-size:16px;font-weight:700;color:${faltando === 0 ? 'var(--green)' : 'var(--text)'}">${preenchidos}/${painelInfo.entries.length}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${faltando > 0 ? `${faltando} matéria(s) ainda sem dados completos` : 'Tudo pronto para calcular'}</div>
      </div>
    </div>
    ${painelInfo.ignoredBlocks ? `<div style="margin-top:10px;font-size:11px;color:var(--text3);line-height:1.6">Obs.: o cálculo automático considera apenas as matérias vinculadas no Painel da Prova. ${painelInfo.ignoredBlocks} bloco(s) sem matéria definida ou redação ficaram fora desta conta.</div>` : ''}
  `;
}

function buildPainelSnapshotFromModal() {
  const painelInfo = getPainelMateriaInfo();
  const isCespe = painelInfo.scoringMode === 'cebraspe';
  const items = [];
  const materiasMap = new Map();
  const notasMaterias = {};
  let totalAcertos = 0;
  let totalEmBranco = 0;
  let totalErros = 0;
  let totalPontos = 0;

  for (let index = 0; index < painelInfo.entries.length; index++) {
    const entry = painelInfo.entries[index];
    const state = readPainelAutoEntryState(entry, index);
    if (state.empty || !state.ok) {
      return {
        ok: false,
        field: state.field || document.getElementById('spaInput_' + index),
        motivo: state.motivo || `Preencha os dados de ${entry.nome} para usar o cálculo automático.`
      };
    }

    items.push({
      key: entry.key,
      materiaId: entry.materiaId,
      nome: entry.nome,
      groupName: entry.groupName,
      questoes: entry.questoes,
      peso: entry.peso,
      scoringMode: entry.scoringMode,
      errorPenalty: entry.errorPenalty,
      acertos: state.acertos,
      emBranco: state.emBranco,
      erros: state.erros,
      pct: state.pct,
      pontosObtidos: state.pontosObtidos,
      pontosMax: entry.pontosMax
    });

    totalAcertos += state.acertos;
    totalEmBranco += state.emBranco || 0;
    totalErros += state.erros || 0;
    totalPontos += state.pontosObtidos;

    const agregado = materiasMap.get(entry.materiaId) || {
      materiaId: entry.materiaId,
      nome: entry.nome,
      questoes: 0,
      acertos: 0,
      emBranco: 0,
      erros: 0,
      pontosObtidos: 0,
      pontosMax: 0
    };
    agregado.questoes += entry.questoes;
    agregado.acertos += state.acertos;
    agregado.emBranco += state.emBranco || 0;
    agregado.erros += state.erros || 0;
    agregado.pontosObtidos = roundTo(agregado.pontosObtidos + state.pontosObtidos, 1);
    agregado.pontosMax = roundTo(agregado.pontosMax + entry.pontosMax, 1);
    materiasMap.set(entry.materiaId, agregado);
  }

  const materias = Array.from(materiasMap.values()).map(item => {
    const pct = item.questoes ? roundTo((item.acertos / item.questoes) * 100, 1) : 0;
    notasMaterias[item.materiaId] = pct;
    return { ...item, pct };
  });
  const pctTotal = painelInfo.totalQuestoes ? roundTo((totalAcertos / painelInfo.totalQuestoes) * 100, 1) : 0;
  const pctPonderada = painelInfo.totalPontos ? roundTo((totalPontos / painelInfo.totalPontos) * 100, 1) : 0;

  return {
    ok: true,
    pct: pctTotal,
    notasMaterias,
    snapshot: {
      version: 2,
      origem: 'painel-prova',
      scoringMode: painelInfo.scoringMode,
      errorPenalty: painelInfo.errorPenalty,
      totalAcertos,
      totalEmBranco,
      totalErros,
      totalQuestoes: painelInfo.totalQuestoes,
      totalPontosObtidos: roundTo(totalPontos, 1),
      totalPontosMax: painelInfo.totalPontos,
      pct: pctTotal,
      pctPonderada,
      ignoredBlocks: painelInfo.ignoredBlocks,
      ignoredPontos: painelInfo.ignoredPontos,
      items,
      materias
    }
  };
}

alternarCamposSimulado = function() {
  const tipo = document.getElementById('simTipo')?.value || 'realizado';
  const modo = document.getElementById('simModoCalc')?.value || 'manual';
  const pendente = tipo === 'pendente';
  const baseGrid = document.getElementById('simBaseGrid');
  const dataWrap = document.getElementById('simDataWrap');
  const linkWrap = document.getElementById('simLinkWrap');
  const notaWrap = document.getElementById('simNotaWrap');
  const materiasWrap = document.getElementById('simMateriasWrap');
  const painelWrap = document.getElementById('simPainelWrap');
  const modoWrap = document.getElementById('simModoWrap');
  const obsWrap = document.getElementById('simObsWrap');
  const painelInfo = getPainelMateriaInfo();

  if (baseGrid) baseGrid.style.gridTemplateColumns = pendente ? '1fr' : '1fr 1fr';
  if (dataWrap) dataWrap.style.display = pendente ? 'none' : '';
  if (linkWrap) linkWrap.style.display = pendente ? '' : 'none';
  if (modoWrap) modoWrap.style.display = pendente ? 'none' : '';
  if (obsWrap) obsWrap.style.display = pendente ? 'none' : '';
  if (notaWrap) notaWrap.style.display = (!pendente && modo === 'manual') ? '' : 'none';
  if (materiasWrap) materiasWrap.style.display = (!pendente && modo === 'manual') ? '' : 'none';
  if (painelWrap) painelWrap.style.display = (!pendente && modo === 'automatico') ? '' : 'none';

  if (painelWrap) {
    const divChildren = Array.from(painelWrap.children).filter(node => node && node.tagName === 'DIV');
    const descEl = divChildren[1] || null;
    if (descEl) {
      descEl.textContent = painelInfo.scoringMode === 'cebraspe'
        ? 'Preencha os acertos e as questões em branco de cada matéria. O Track deduz os erros automaticamente, calcula a nota CESPE/CEBRASPE e salva um raio-x completo para os gráficos.'
        : 'Preencha os acertos de cada matéria. O Track calcula automaticamente o percentual geral, a pontuação ponderada e salva um raio-x completo para os gráficos.';
    }
  }

  if (!pendente && modo === 'automatico') atualizarResumoPainelSimulado();
}
